<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太原城市详情页 - 原稿提亮版</title>
  <style>
    :root {
      --app: #171924;
      --app-2: #1d202d;
      --hero: #222437;
      --card: #242736;
      --card-2: #2b2e3e;
      --line: rgba(246, 241, 233, .12);
      --line-strong: rgba(246, 241, 233, .2);
      --text: #fffaf1;
      --sub: rgba(255, 250, 241, .72);
      --dim: rgba(255, 250, 241, .52);
      --gold: #d9b66d;
      --gold-soft: rgba(217, 182, 109, .16);
      --orange: #e57649;
      --green: #7fb586;
      --blue: #6fa7c2;
      --shadow: 0 28px 80px rgba(9, 10, 16, .38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 22% 18%, rgba(217, 182, 109, .14), transparent 28%),
        radial-gradient(circle at 82% 24%, rgba(111, 167, 194, .16), transparent 26%),
        linear-gradient(135deg, #2a2631, #181a24);
      color: var(--text);
      font-family: -apple-system, "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
      padding: 26px;
    }

    .wrap {
      width: min(100%, 1040px);
      display: grid;
      grid-template-columns: 410px minmax(300px, 1fr);
      gap: 34px;
      align-items: center;
    }

    .phone {
      width: 410px;
      height: 884px;
      border-radius: 48px;
      border: 10px solid #050608;
      overflow: hidden;
      background: var(--app);
      box-shadow: var(--shadow);
      position: relative;
    }

    .screen {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
      background:
        radial-gradient(circle at 18% 6%, rgba(217, 182, 109, .08), transparent 24%),
        linear-gradient(180deg, #191b27 0%, var(--app) 42%, #151721 100%);
      padding-bottom: 26px;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    .status {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 12px;
      font-weight: 850;
      color: var(--text);
      position: absolute;
      inset: 0 0 auto 0;
      z-index: 10;
    }

    .hero {
      min-height: 292px;
      padding: 48px 20px 20px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(20, 21, 31, .05), rgba(20, 21, 31, .55)),
        radial-gradient(circle at 22% 42%, rgba(217, 182, 109, .18), transparent 22%),
        radial-gradient(circle at 86% 24%, rgba(111, 167, 194, .12), transparent 28%),
        linear-gradient(135deg, #2d2441, #202a38 58%, #171924);
      border-bottom: 1px solid var(--line);
    }

    .hero::before {
      content: "";
      position: absolute;
      right: 36px;
      top: 112px;
      width: 88px;
      height: 92px;
      background:
        linear-gradient(#4b4e64 0 0) center 36px / 56px 44px no-repeat,
        linear-gradient(#d9c48e 0 0) center 59px / 74px 9px no-repeat,
        linear-gradient(#25304a 0 0) center 22px / 82px 12px no-repeat;
      clip-path: polygon(50% 0, 98% 20%, 86% 24%, 86% 96%, 14% 96%, 14% 24%, 2% 20%);
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.28));
      opacity: .98;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -28px;
      bottom: -18px;
      width: 270px;
      height: 74px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,.28), rgba(255,255,255,.06)),
        rgba(111, 167, 194, .42);
      transform: rotate(-8deg);
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .icon-button,
    .lang-button {
      min-width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(217, 182, 109, .34);
      background: rgba(255, 255, 255, .1);
      color: var(--text);
      display: grid;
      place-items: center;
      font-weight: 900;
      backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }

    .lang-button {
      padding: 0 13px;
      color: var(--gold);
      font-size: 12px;
    }

    .hero-copy {
      position: relative;
      z-index: 2;
      margin-top: 70px;
      max-width: 280px;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--gold);
      background: var(--gold-soft);
      border: 1px solid rgba(217, 182, 109, .36);
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 13px 0 8px;
      font-size: 48px;
      line-height: 1;
      letter-spacing: 0;
    }

    .hero-copy p {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 7;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 8px 16px 0;
      background: rgba(23, 25, 36, .96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }

    .tab {
      appearance: none;
      border: 0;
      min-height: 60px;
      background: transparent;
      color: var(--dim);
      font: inherit;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      position: relative;
    }

    .tab.active {
      color: var(--gold);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 24%;
      right: 24%;
      bottom: 0;
      height: 4px;
      border-radius: 99px 99px 0 0;
      background: var(--gold);
      box-shadow: 0 0 18px rgba(217, 182, 109, .34);
    }

    .content {
      padding: 18px 16px;
      display: grid;
      gap: 16px;
    }

    .panel {
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, var(--card-2), var(--card));
      border: 1px solid var(--line-strong);
      box-shadow: 0 18px 38px rgba(0,0,0,.18);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .section-head small {
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
    }

    .media-card {
      min-height: 176px;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, transparent 34%, rgba(0,0,0,.62)),
        linear-gradient(135deg, #cfb77e, #806045 48%, #2d4452);
      border: 1px solid var(--line-strong);
      box-shadow: 0 18px 36px rgba(0,0,0,.22);
    }

    .media-card::before {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.13);
    }

    .media-label {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
    }

    .media-label b {
      display: block;
      margin-bottom: 3px;
      font-size: 17px;
    }

    .media-label span {
      color: var(--sub);
      font-size: 12px;
      font-weight: 760;
    }

    .play {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(217,182,109,.9);
      color: #2b2111;
      font-weight: 950;
      box-shadow: 0 12px 24px rgba(0,0,0,.24);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      min-height: 88px;
      padding: 13px 10px;
      border-radius: 20px;
      background: #292c3c;
      border: 1px solid var(--line-strong);
      display: grid;
      align-content: space-between;
      text-align: center;
    }

    .stat b {
      color: var(--gold);
      font-size: 20px;
      font-weight: 760;
    }

    .stat span {
      color: var(--sub);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 730;
    }

    .copy {
      margin: 0;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.82;
      text-wrap: pretty;
    }

    .chips,
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip,
    .filter {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--sub);
      background: rgba(255,255,255,.08);
      font: inherit;
      font-size: 12px;
      font-weight: 850;
    }

    .chip.primary,
    .filter.active {
      color: var(--gold);
      background: var(--gold-soft);
      border-color: rgba(217,182,109,.36);
    }

    .filter {
      cursor: pointer;
    }

    .spot-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .spot-card {
      min-height: 164px;
      border: 1px solid var(--line-strong);
      border-radius: 22px;
      background: #262938;
      color: var(--text);
      padding: 11px;
      text-align: left;
      font: inherit;
      cursor: pointer;
      display: grid;
      align-content: space-between;
      box-shadow: 0 16px 30px rgba(0,0,0,.16);
    }

    .spot-art {
      height: 70px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 30px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #4c3b55, #26364b);
    }

    .spot-art.green {
      background: linear-gradient(135deg, #27422f, #24364b);
    }

    .spot-art.red {
      background: linear-gradient(135deg, #55312d, #2a2c3a);
    }

    .rating {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(217,182,109,.9);
      color: #2b2111;
      font-size: 11px;
      font-weight: 950;
    }

    .spot-card h3,
    .food-card h3 {
      margin: 10px 0 4px;
      font-size: 15px;
    }

    .spot-card p,
    .food-card p {
      margin: 0;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.48;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 2px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--line-strong);
      background: #242736;
    }

    .list-item {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .list-item:last-child {
      border-bottom: 0;
    }

    .thumb {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(217,182,109,.13);
      color: var(--gold);
      font-size: 22px;
    }

    .list-item b {
      display: block;
      margin-bottom: 3px;
      font-size: 15px;
    }

    .list-item span {
      color: var(--dim);
      font-size: 12px;
      font-weight: 720;
    }

    .score {
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;
      text-align: right;
    }

    .food-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .food-card {
      min-height: 168px;
      border-radius: 22px;
      background: #262938;
      border: 1px solid var(--line-strong);
      padding: 12px;
      display: grid;
      align-content: space-between;
      box-shadow: 0 16px 30px rgba(0,0,0,.16);
    }

    .food-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
    }

    .food-icon {
      width: 58px;
      height: 58px;
      border-radius: 19px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #a94f36, #5c3440);
      font-size: 28px;
      font-weight: 950;
    }

    .save {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--dim);
      cursor: pointer;
      font-size: 16px;
    }

    .save.on {
      color: #1f1720;
      background: var(--gold);
      border-color: var(--gold);
    }

    .heat {
      display: flex;
      gap: 4px;
      margin-top: 9px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
    }

    .dot.on {
      background: var(--orange);
    }

    .route-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .route-option {
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: #262938;
      color: var(--sub);
      padding: 11px 9px;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .route-option.active {
      background: var(--gold-soft);
      border-color: rgba(217,182,109,.4);
      color: var(--gold);
    }

    .route-option b {
      display: block;
      font-size: 13px;
      margin-bottom: 3px;
    }

    .route-option span {
      color: inherit;
      opacity: .75;
      font-size: 11px;
      font-weight: 730;
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .stop {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
    }

    .stop-num {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--gold);
      color: #251b0e;
      font-size: 13px;
      font-weight: 950;
    }

    .stop-card {
      padding: 13px;
      border-radius: 18px;
      background: #292c3c;
      border: 1px solid var(--line-strong);
    }

    .stop-card b {
      display: block;
      margin-bottom: 5px;
      font-size: 15px;
    }

    .stop-card span {
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 720;
    }

    .primary-action {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, #e0bd74, #a97a34);
      color: #21170a;
      font: inherit;
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(217,182,109,.18);
    }

    .sheet {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      padding: 18px;
      border-radius: 28px;
      background: #2c2f40;
      border: 1px solid var(--line-strong);
      box-shadow: 0 24px 70px rgba(0,0,0,.38);
      transform: translateY(calc(100% + 24px));
      transition: transform .24s ease;
      pointer-events: none;
    }

    .sheet.open {
      transform: translateY(0);
      pointer-events: auto;
    }

    .handle {
      width: 40px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      margin: 0 auto 14px;
    }

    .sheet-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .sheet h3 {
      margin: 0 0 7px;
      font-size: 21px;
    }

    .sheet p {
      margin: 0;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.6;
    }

    .close {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }

    .notes {
      padding: 24px;
      border-radius: 28px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 20px 48px rgba(0,0,0,.2);
      backdrop-filter: blur(16px);
    }

    .notes h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .notes p {
      margin: 0;
      color: rgba(255,250,241,.74);
      font-size: 15px;
      line-height: 1.75;
    }

    .points {
      display: grid;
      gap: 11px;
      margin-top: 18px;
    }

    .point {
      padding: 13px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }

    .point b {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .point span {
      color: rgba(255,250,241,.7);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 720;
    }

    @media (max-width: 900px) {
      body {
        padding: 16px;
      }

      .wrap {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .notes {
        width: min(100%, 410px);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="phone" data-screen-label="太原原稿提亮版">
      <div class="status">
        <span>21:55</span>
        <span>5G 100%</span>
      </div>

      <div class="screen">
        <header class="hero">
          <div class="topbar">
            <button class="icon-button" aria-label="返回">‹</button>
            <button class="lang-button" aria-label="切换语言">🌐</button>
          </div>
          <div class="hero-copy">
            <span class="badge">山西省省会</span>
            <h1>太原</h1>
            <p>锦绣太原城 · 龙城文脉 · 汾河烟火</p>
          </div>
        </header>

        <nav class="tabs" aria-label="城市详情页面">
          <button class="tab active" data-tab="intro">介绍</button>
          <button class="tab" data-tab="spots">景点</button>
          <button class="tab" data-tab="food">美食</button>
          <button class="tab" data-tab="route">路线</button>
        </nav>

        <section class="content" id="content"></section>
      </div>

      <aside class="sheet" id="sheet">
        <div class="handle"></div>
        <div class="sheet-top">
          <div>
            <h3 id="sheetTitle">晋祠</h3>
            <p id="sheetText">千年古建与晋水文化，是太原景点页的核心推荐。</p>
            <div class="chips" id="sheetChips"></div>
          </div>
          <button class="close" id="close" aria-label="关闭">×</button>
        </div>
      </aside>
    </section>

    <aside class="notes">
      <h2>原稿提亮版</h2>
      <p>这版保留原稿的深色高级感、Hero、四个 Tab 和内容结构，只把背景、卡片、文字和按钮的亮度拉开，让阅读不那么吃力。</p>
      <div class="points">
        <div class="point">
          <b>整体色调</b>
          <span>近黑背景提升到深蓝灰，仍然是夜色龙城，但信息更清楚。</span>
        </div>
        <div class="point">
          <b>内容层级</b>
          <span>卡片、分割线、次级文字对比度提高，列表不再糊在背景里。</span>
        </div>
        <div class="point">
          <b>交互保留</b>
          <span>景点详情、美食收藏、路线切换和复制反馈仍可点击。</span>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const state = {
      tab: "intro",
      filter: "全部",
      route: "龙城印象",
      saved: new Set(["刀削面"])
    };

    const spots = [
      { title: "晋祠", type: "古建", icon: "🏯", art: "", rating: "5A", text: "千年古建与晋水文化，适合放在景点页首位。", chips: ["古建", "晋水", "必去"] },
      { title: "山西博物院", type: "文化", icon: "🏛", art: "green", rating: "4A", text: "室内文化景点，承接龙城文脉。", chips: ["室内", "免费", "文化"] },
      { title: "永祚寺双塔", type: "地标", icon: "🗼", art: "red", rating: "4A", text: "太原城市地标，适合拍照和路线收尾。", chips: ["地标", "拍照", "古迹"] },
      { title: "汾河公园", type: "自然", icon: "🌿", art: "green", rating: "免费", text: "夜景和散步路线，适合傍晚慢游。", chips: ["夜景", "散步", "免费"] },
      { title: "柳巷钟楼街", type: "街区", icon: "🛍", art: "red", rating: "4.7", text: "老字号云集，可以联动美食页。", chips: ["街区", "美食", "夜游"] }
    ];

    const foods = [
      { title: "刀削面", icon: "面", text: "山西面食名片，主推卡片。", heat: 5 },
      { title: "过油肉", icon: "肉", text: "晋菜经典头牌。", heat: 4 },
      { title: "羊杂割", icon: "汤", text: "冬日暖身必备。", heat: 4 },
      { title: "剔尖", icon: "尖", text: "筷子拨出的花样。", heat: 3 },
      { title: "莜面栲栳栳", icon: "莜", text: "晋北粗粮经典。", heat: 3 },
      { title: "太原酱肉", icon: "酱", text: "卤味老字号风味。", heat: 4 }
    ];

    const routes = {
      "龙城印象": [
        ["09:00", "山西博物院", "从史前到明清，两小时穿越三晋五千年"],
        ["13:00", "永祚寺双塔", "登塔俯瞰太原城，走古寺庭院"],
        ["17:00", "汾河公园 · 日落", "汾河晚风，夕阳映双塔"]
      ],
      "古建寻踪": [
        ["08:30", "晋祠", "看圣母殿、鱼沼飞梁和晋水"],
        ["13:30", "双塔寺", "城市地标与古寺建筑"],
        ["18:30", "钟楼街", "老字号晚餐与夜游"]
      ],
      "烟火美食": [
        ["10:00", "柳巷", "早餐和老街区"],
        ["12:00", "刀削面", "面食主线"],
        ["19:00", "夜市", "羊杂割、酱肉和小吃"]
      ]
    };

    const content = document.getElementById("content");
    const sheet = document.getElementById("sheet");
    const sheetTitle = document.getElementById("sheetTitle");
    const sheetText = document.getElementById("sheetText");
    const sheetChips = document.getElementById("sheetChips");

    function setTab(tab) {
      state.tab = tab;
      closeSheet();
      document.querySelectorAll(".tab").forEach((button) => button.classList.toggle("active", button.dataset.tab === tab));
      render();
    }

    function openSheet(item) {
      sheetTitle.textContent = item.title;
      sheetText.textContent = item.text;
      sheetChips.innerHTML = item.chips.map((chip, index) => `<span class="chip ${index === 0 ? "primary" : ""}">${chip}</span>`).join("");
      sheet.classList.add("open");
    }

    function closeSheet() {
      sheet.classList.remove("open");
    }

    function renderIntro() {
      content.innerHTML = `
        <div class="media-card">
          <div class="media-label">
            <div><b>锦绣太原</b><span>城市封面 / 可替换真实图片</span></div>
            <div class="play">▶</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><b>551万</b><span>城市人口</span></div>
          <div class="stat"><b>2500+</b><span>历史</span></div>
          <div class="stat"><b>4A+</b><span>顶级景区</span></div>
        </div>
        <article class="panel">
          <div class="section-head"><h2>家乡介绍</h2><small>INTRO</small></div>
          <p class="copy">太原古称晋阳、并州，也被称作“龙城”。它坐落在汾河谷地，是山西的政治、经济、文化中心。这座城市有 2500 余年建城史，晋祠、永祚寺双塔、山西博物院和汾河两岸，把古都的厚重与今天的烟火气连在一起。</p>
          <div class="chips">
            <span class="chip primary">国家历史文化名城</span>
            <span class="chip">龙城</span>
            <span class="chip">晋阳古都</span>
            <span class="chip">汾河穿城</span>
            <span class="chip">面食之乡</span>
          </div>
        </article>
      `;
    }

    function renderSpots() {
      const filters = ["全部", "古建", "文化", "地标", "自然", "街区"];
      const visible = state.filter === "全部" ? spots : spots.filter((spot) => spot.type === state.filter);
      content.innerHTML = `
        <div class="filters">${filters.map((filter) => `<button class="filter ${state.filter === filter ? "active" : ""}" data-filter="${filter}">${filter}</button>`).join("")}</div>
        <section class="spot-row">
          ${visible.slice(0, 3).map((spot) => `
            <button class="spot-card" data-spot="${spots.indexOf(spot)}">
              <div class="spot-art ${spot.art}">${spot.icon}<span class="rating">${spot.rating}</span></div>
              <div><h3>${spot.title}</h3><p>${spot.text}</p></div>
            </button>
          `).join("")}
        </section>
        <section class="list">
          ${visible.map((spot) => `
            <button class="list-item spot-button" data-spot="${spots.indexOf(spot)}">
              <div class="thumb">${spot.icon}</div>
              <div><b>${spot.title}</b><span>${spot.type} · ${spot.chips.join(" · ")}</span></div>
              <div class="score">★ ${spot.rating}</div>
            </button>
          `).join("")}
        </section>
      `;
      content.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          state.filter = button.dataset.filter;
          renderSpots();
        });
      });
      content.querySelectorAll("[data-spot]").forEach((button) => {
        button.addEventListener("click", () => openSheet(spots[Number(button.dataset.spot)]));
      });
    }

    function renderFood() {
      content.innerHTML = `
        <div class="filters">
          <button class="filter active">推荐</button>
          <button class="filter">面食</button>
          <button class="filter">晋菜</button>
          <button class="filter">小吃</button>
        </div>
        <section class="food-grid">
          ${foods.map((food) => `
            <div class="food-card">
              <div class="food-top">
                <div class="food-icon">${food.icon}</div>
                <button class="save ${state.saved.has(food.title) ? "on" : ""}" data-food="${food.title}" aria-label="收藏 ${food.title}">♥</button>
              </div>
              <div>
                <h3>${food.title}</h3>
                <p>${food.text}</p>
                <div class="heat">${Array.from({ length: 5 }).map((_, i) => `<span class="dot ${i < food.heat ? "on" : ""}"></span>`).join("")}</div>
              </div>
            </div>
          `).join("")}
        </section>
      `;
      content.querySelectorAll("[data-food]").forEach((button) => {
        button.addEventListener("click", () => {
          const name = button.dataset.food;
          if (state.saved.has(name)) state.saved.delete(name);
          else state.saved.add(name);
          renderFood();
        });
      });
    }

    function renderRoute() {
      const stops = routes[state.route];
      content.innerHTML = `
        <div class="route-switch">
          ${Object.keys(routes).map((route) => `
            <button class="route-option ${state.route === route ? "active" : ""}" data-route="${route}">
              <b>${route}</b><span>${routes[route].length} 站</span>
            </button>
          `).join("")}
        </div>
        <article class="panel">
          <div class="section-head"><h2>${state.route}</h2><small>推荐</small></div>
          <div class="timeline">
            ${stops.map((stop, index) => `
              <div class="stop">
                <div class="stop-num">${index + 1}</div>
                <div class="stop-card"><b>${stop[1]}</b><span>${stop[0]} · ${stop[2]}</span></div>
              </div>
            `).join("")}
          </div>
        </article>
        <button class="primary-action" id="copyRoute">复制路线</button>
        <div class="stats">
          <div class="stat"><b>1</b><span>天</span></div>
          <div class="stat"><b>${stops.length}</b><span>打卡点</span></div>
          <div class="stat"><b>¥150</b><span>预算/人</span></div>
        </div>
      `;
      content.querySelectorAll("[data-route]").forEach((button) => {
        button.addEventListener("click", () => {
          state.route = button.dataset.route;
          renderRoute();
        });
      });
      document.getElementById("copyRoute").addEventListener("click", (event) => {
        event.currentTarget.textContent = "已复制路线";
        setTimeout(() => { event.currentTarget.textContent = "复制路线"; }, 1100);
      });
    }

    function render() {
      if (state.tab === "intro") renderIntro();
      if (state.tab === "spots") renderSpots();
      if (state.tab === "food") renderFood();
      if (state.tab === "route") renderRoute();
    }

    document.querySelectorAll(".tab").forEach((button) => button.addEventListener("click", () => setTab(button.dataset.tab)));
    document.getElementById("close").addEventListener("click", closeSheet);
    render();
  </script>
</body>
</html>
